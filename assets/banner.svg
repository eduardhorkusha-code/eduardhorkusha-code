<svg width="1280" height="300" viewBox="0 0 1280 300" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222631"/>
      <stop offset="1" stop-color="#060607"/>
    </linearGradient>
    <linearGradient id="redline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FD3433"/>
      <stop offset="1" stop-color="#FD3433" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="300" rx="16" fill="url(#bg)"/>

  <!-- decorative geometric grid (right side) -->
  <g transform="translate(905 60)">
    <rect x="0"   y="0"   width="52" height="52" rx="8" fill="#FD3433" fill-opacity="0.95"/>
    <rect x="64"  y="0"   width="52" height="52" rx="8" fill="#FD3433" fill-opacity="0.35"/>
    <rect x="128" y="0"   width="52" height="52" rx="8" fill="#FFFFFF" fill-opacity="0.06"/>
    <rect x="192" y="0"   width="52" height="52" rx="8" fill="#FD3433" fill-opacity="0.18"/>
    <rect x="0"   y="64"  width="52" height="52" rx="8" fill="#FFFFFF" fill-opacity="0.06"/>
    <rect x="64"  y="64"  width="52" height="52" rx="8" fill="#FD3433" fill-opacity="0.55"/>
    <rect x="128" y="64"  width="52" height="52" rx="8" fill="#FD3433" fill-opacity="0.25"/>
    <rect x="192" y="64"  width="52" height="52" rx="8" fill="#FFFFFF" fill-opacity="0.06"/>
    <rect x="0"   y="128" width="52" height="52" rx="8" fill="#FD3433" fill-opacity="0.20"/>
    <rect x="64"  y="128" width="52" height="52" rx="8" fill="#FFFFFF" fill-opacity="0.06"/>
    <rect x="128" y="128" width="52" height="52" rx="8" fill="#FD3433" fill-opacity="0.95"/>
    <rect x="192" y="128" width="52" height="52" rx="8" fill="#FD3433" fill-opacity="0.40"/>
  </g>

  <!-- left text block -->
  <g transform="translate(72 0)">
    <!-- tag -->
    <rect x="0" y="78" width="252" height="30" rx="15" fill="#FD3433" fill-opacity="0.14"/>
    <text x="18" y="98" font-size="14" font-weight="600" letter-spacing="3" fill="#FD3433">AI · AGENTS · PRODUCT</text>

    <!-- name -->
    <text x="-2" y="168" font-size="58" font-weight="700" letter-spacing="-1.5" fill="#FFFFFF">Eduard Horkusha</text>

    <!-- role -->
    <text x="0" y="208" font-size="24" font-weight="500" fill="#FFFFFF" fill-opacity="0.72">AI-native Product Engineer</text>

    <!-- accent underline -->
    <rect x="0" y="230" width="520" height="3" rx="1.5" fill="url(#redline)"/>
  </g>
</svg>
