<svg width="1280" height="190" viewBox="0 0 1280 190" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="mFront" x1="0" y1="60" x2="0" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FD3433" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#FD3433" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="mMid" x1="0" y1="50" x2="0" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FD3433" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FD3433" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="mBack" x1="0" y1="40" x2="0" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FD3433" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FD3433" stop-opacity="0.10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FD3433" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FD3433" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- glow behind the main summit -->
  <ellipse cx="560" cy="86" rx="260" ry="80" fill="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="5.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- twinkling stars -->
  <g fill="#FFFFFF">
    <circle cx="180" cy="38" r="1.8"><animate attributeName="opacity" values="0.15;1;0.15" dur="2.4s" begin="0s"   repeatCount="indefinite"/></circle>
    <circle cx="330" cy="26" r="1.4"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.1s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="32" r="1.6"><animate attributeName="opacity" values="0.15;1;0.15" dur="2.7s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="44" r="1.3"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.4s" begin="0.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- back range (faint, tallest) — gentle drift -->
  <path fill="url(#mBack)" d="M0,118 L210,58 L430,104 L650,52 L910,100 L1190,60 L1280,96 L1280,190 L0,190 Z">
    <animateTransform attributeName="transform" type="translate" values="0 0;16 0;0 0" dur="18s" repeatCount="indefinite"/>
  </path>

  <!-- mid range -->
  <path fill="url(#mMid)" d="M0,140 L160,86 L320,128 L500,76 L680,124 L860,80 L1040,126 L1210,88 L1280,118 L1280,190 L0,190 Z"/>

  <!-- front range (bold, sharp) -->
  <path fill="url(#mFront)" d="M0,168 L90,150 L180,104 L250,150 L360,88 L470,152 L560,68 L660,152 L760,98 L880,154 L980,80 L1090,150 L1190,120 L1280,148 L1280,190 L0,190 Z"/>

  <!-- snow-lit ridge highlight on the front range -->
  <path fill="none" stroke="#FFFFFF" stroke-opacity="0.40" stroke-width="1.3" stroke-linejoin="round" d="M0,168 L90,150 L180,104 L250,150 L360,88 L470,152 L560,68 L660,152 L760,98 L880,154 L980,80 L1090,150 L1190,120 L1280,148"/>

  <!-- snow caps on the tallest summits -->
  <g fill="#FFFFFF" fill-opacity="0.9">
    <path d="M544,84 L560,68 L576,84 L568,80 L560,86 L552,80 Z"/>
    <path d="M966,94 L980,80 L994,94 L987,90 L980,96 L973,90 Z"/>
    <path d="M346,100 L360,88 L374,100 L367,96 L360,102 L353,96 Z" fill-opacity="0.75"/>
  </g>

  <!-- caption -->
  <text x="640" y="32" text-anchor="middle" font-size="13" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.72">BUILT WITH CLAUDE CODE</text>
</svg>
