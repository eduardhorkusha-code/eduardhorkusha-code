<svg width="1280" height="160" viewBox="0 0 1280 160" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="w1" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FD3433" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FD3433" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="w2" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FD3433" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#FD3433" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- back wave (slow, faint) -->
  <g fill="url(#w2)">
    <path d="M0,86 q80,-34 160,0 q80,34 160,0 q80,-34 160,0 q80,34 160,0 q80,-34 160,0 q80,34 160,0 q80,-34 160,0 q80,34 160,0 q80,-34 160,0 q80,34 160,0 q80,-34 160,0 q80,34 160,0 q80,-34 160,0 q80,34 160,0 q80,-34 160,0 q80,34 160,0 V160 H0 Z">
      <animateTransform attributeName="transform" type="translate" values="-1280 0;0 0" dur="14s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- front wave (faster, bold) -->
  <g fill="url(#w1)">
    <path d="M0,104 q80,-40 160,0 q80,40 160,0 q80,-40 160,0 q80,40 160,0 q80,-40 160,0 q80,40 160,0 q80,-40 160,0 q80,40 160,0 q80,-40 160,0 q80,40 160,0 q80,-40 160,0 q80,40 160,0 q80,-40 160,0 q80,40 160,0 q80,-40 160,0 q80,40 160,0 V160 H0 Z">
      <animateTransform attributeName="transform" type="translate" values="0 0;-1280 0" dur="9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- caption -->
  <text x="640" y="56" text-anchor="middle" font-size="14" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">BUILT WITH CLAUDE CODE</text>
</svg>
